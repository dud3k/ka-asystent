<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Opcja 3: High Contrast / Utility</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ac: #D97700; --bg: #ffffff; --text: #000000; --border: #000000; }
  body { font-family: "SF Mono", "Menlo", "Consolas", monospace; background: var(--bg); color: var(--text); padding-bottom: 20px; font-size: 14px; }
  .app-container { max-width: 480px; margin: 0 auto; border-left: 2px solid var(--border); border-right: 2px solid var(--border); min-height: 100vh; }

  /* Header */
  .header { background: var(--text); color: var(--white); padding: 12px 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; }

  /* Filter Bar */
  .toolbar { border-bottom: 2px solid var(--border); padding: 8px 16px; display: flex; gap: 8px; background: #f0f0f0; }
  .toolbar select { font-family: inherit; font-size: 12px; border: 1px solid var(--border); background: white; padding: 4px; flex: 1; }

  /* Table/List */
  .list-row { border-bottom: 1px solid var(--border); padding: 12px 16px; display: grid; grid-template-columns: 1fr auto; gap: 8px; }
  .list-row:nth-child(even) { background: #f9f9f9; }
  .title { font-weight: bold; grid-column: 1 / -1; }
  .status { background: var(--text); color: white; padding: 2px 6px; font-size: 11px; display: inline-block; }
  .status.green { background: #006600; }
  .status.yellow { background: var(--ac); }
  .price { font-weight: bold; text-align: right; }
  .track { grid-column: 1 / -1; font-size: 12px; color: #444; border-top: 1px dashed #ccc; padding-top: 4px; margin-top: 4px; }

  /* Action Button */
  .btn-full { display: block; width: calc(100% - 32px); margin: 16px; background: var(--ac); color: white; text-align: center; padding: 12px; font-weight: bold; text-transform: uppercase; text-decoration: none; border: 2px solid var(--border); cursor: pointer; }
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <span>KA ASYSTENT v2.8</span>
    <span>[ SYNC ]</span>
  </div>

  <div class="toolbar">
    <select><option>STATUS: WSZYSTKIE</option></select>
    <select><option>SORT: AKTUALIZACJA</option></select>
  </div>

  <button class="btn-full">+ DODAJ NOWY SKAN</button>

  <div class="list-container">
    <div class="list-row">
      <div class="title">CANON EF 24-70MM F/2.8 USM</div>
      <div><span class="status green">KUPIONO</span></div>
      <div class="price">325 EUR</div>
      <div class="track">TRK: DHL 00340434391975897307</div>
    </div>

    <div class="list-row">
      <div class="title">NIKON D3500 KAMERA SET</div>
      <div><span class="status yellow">W DRODZE</span></div>
      <div class="price">230 EUR</div>
      <div class="track">TRK: HERMES 02077168012884</div>
    </div>

    <div class="list-row">
      <div class="title">PANASONIC KAMERA</div>
      <div><span class="status">NEGOCJACJE</span></div>
      <div class="price">59 EUR</div>
    </div>
  </div>
</div>
</body>
</html>
